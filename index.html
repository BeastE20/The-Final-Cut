  .studio-info { color: #a0a0b0; font-size: 12px; }

  #sidebar { width: 160px; background: #16213e; border-right: 1px solid #0f3460; padding: 10px 0; flex-shrink: 0; }
  #content { flex: 1; padding: 16px; overflow-y: auto; }

  /* SIDEBAR NAV */
  .nav-item { padding: 10px 16px; cursor: pointer; color: #a0a0b0; border-left: 3px solid transparent; font-size: 13px; }
  .nav-item:hover { background: #0f3460; color: #e0e0e0; }
  .nav-item.active { background: #0f3460; color: #e94560; border-left-color: #e94560; }
  .nav-section { padding: 8px 16px 4px; font-size: 10px; color: #606080; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }

  /* PANELS */
  .panel { background: #16213e; border: 1px solid #0f3460; border-radius: 4px; padding: 16px; margin-bottom: 14px; }
  .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #e94560; margin-bottom: 12px; border-bottom: 1px solid #0f3460; padding-bottom: 8px; }
  .page-title { font-size: 20px; color: #e0e0e0; margin-bottom: 16px; font-weight: bold; }

  /* TABLES */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #808090; border-bottom: 1px solid #0f3460; }
  td { padding: 8px 10px; border-bottom: 1px solid #0f3460; color: #c0c0d0; font-size: 13px; }
  tr:hover td { background: #0f3460; cursor: pointer; }
  tr.selected td { background: #1a3a6e; }

  /* STARS */
  .stars { color: #e94560; font-size: 13px; letter-spacing: 1px; }
  .stars-empty { color: #404060; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: bold; margin: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-red { background: #e9456022; border: 1px solid #e94560; color: #e94560; }
  .badge-blue { background: #0f346022; border: 1px solid #4a90d9; color: #4a90d9; }
  .badge-green { background: #20604022; border: 1px solid #40c060; color: #40c060; }
  .badge-yellow { background: #c0901022; border: 1px solid #c09010; color: #c09010; }
  .badge-purple { background: #8040c022; border: 1px solid #a060e0; color: #a060e0; }
  .badge-gray { background: #40404022; border: 1px solid #808090; color: #808090; }

  /* BUTTONS */
  .btn { padding: 8px 16px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .btn-primary { background: #e94560; color: white; }
  .btn-primary:hover { background: #c73350; }
  .btn-secondary { background: #0f3460; color: #c0c0d0; border: 1px solid #4a90d9; }
  .btn-secondary:hover { background: #1a4a80; }
  .btn-success { background: #207040; color: white; border: 1px solid #40c060; }
  .btn-success:hover { background: #308050; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* FORMS */
  select, input { background: #0f1a30; border: 1px solid #0f3460; color: #e0e0e0; padding: 7px 10px; border-radius: 3px; font-size: 13px; width: 100%; }
  select:focus, input:focus { outline: 1px solid #e94560; }
  label { font-size: 11px; color: #808090; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; margin-top: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .detail-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .stat-box { background: #0f1a30; border: 1px solid #0f3460; border-radius: 3px; padding: 12px; text-align: center; }
  .stat-box .val { font-size: 22px; font-weight: bold; color: #e94560; }
  .stat-box .lbl { font-size: 10px; color: #606080; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
  .skill-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #0f1a30; }
  .skill-name { font-size: 12px; color: #a0a0b0; }
  .skill-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .skill-bar { height: 6px; background: #0f1a30; border-radius: 3px; width: 80px; }
  .skill-bar-fill { height: 100%; border-radius: 3px; background: #e94560; }

  /* ROLE SLOTS */
  .role-slot { background: #0f1a30; border: 1px solid #0f3460; border-radius: 3px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }

  .role-slot.empty { border-color: #606080; border-style: dashed; }
  .role-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #808090; }
  .role-actor { font-size: 13px; color: #e0e0e0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .text-red { color: #e94560; }
  .text-green { color: #40c060; }
  .text-yellow { color: #c0a020; }
  .divider { border: none; border-top: 1px solid #0f3460; margin: 14px 0; }
  .empty-state { color: #606080; font-style: italic; padding: 20px; text-align: center; }

    .skill-bar { width: 50px; }

// ============================================================
// SAVE / LOAD
// ============================================================

function saveGame() {
  try {
    localStorage.setItem("he_save", JSON.stringify(STATE));
  } catch(e) { console.warn("Save failed", e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem("he_save");
    if (raw) {
      const saved = JSON.parse(raw);
      STATE = { ...STATE, ...saved };
    }
  } catch(e) { console.warn("Load failed", e); }
}

// ============================================================
// NAVIGATION
// ============================================================

function navigate(view) {
  STATE.currentView = view;
  STATE.selectedTalentId = null;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navMap = {
    "dashboard":"Dashboard","actors":"Actors","directors":"Directors",
    "create-project":"New Project","projects":"Active Projects"
  };
  document.querySelectorAll(".nav-item").forEach(el => {
    if (el.textContent.trim() === (navMap[view] || "")) el.classList.add("active");
  });
  render();
  saveGame();
}

// ============================================================
// HELPERS
// ============================================================

function stars(n, max=5) {
  let s = "";
  for (let i=0;i<max;i++) s += i<n ? "★" : "☆";
  return `<span class="stars">${"★".repeat(n)}</span><span class="stars-empty">${"☆".repeat(max-n)}</span>`;
}

function badge(text, cls="badge-gray") {
  return `<span class="badge ${cls}">${text}</span>`;
}

function traitBadge(traitName, isDirector=false) {
  const pool = isDirector ? DIRECTOR_TRAITS : ACTOR_TRAITS;
  const t = pool[traitName];
  if (!t) return badge(traitName);
  return `<span class="badge ${t.color}" title="${t.desc}">${traitName}</span>`;
}

function skillBar(val, max=5) {
  const pct = (val/max)*100;
  return `<div class="skill-bar"><div class="skill-bar-fill" style="width:${pct}%"></div></div>`;
}

function getRoleMinimums(genre, castSizeIdx) {
  const mins = ROLE_MINIMUMS[genre];
  if (!mins) return [1,3,0];
  return mins[castSizeIdx] || [1,3,0];
}

function getAllTalent() {
  return [...STATE.actors, ...STATE.directors];
}

function getTalentById(id) {
  return getAllTalent().find(t => t.id === id);
}

function getActorById(id) {
  return STATE.actors.find(a => a.id === id);
}

function getDirectorById(id) {
  return STATE.directors.find(d => d.id === id);
}

function genrePreferenceLabel(actor, genre) {
  if (actor.specialization === genre) return badge("Specializes", "badge-purple");
  if (actor.genrePreference && actor.genrePreference.includes(genre)) return badge("Prefers", "badge-green");
  if (actor.genreDislike && actor.genreDislike.includes(genre)) return badge("Dislikes", "badge-red");
  return "";
}

}

function proceedToCasting() {
  const p = STATE.newProject;
  if (!p.title || !p.directorId) return;
  const mins = getRoleMinimums(p.genre, p.castSize);
  const [minLeads, minSupporting, minMinor] = mins;
  p.roles = [];
  for (let i=0;i<minLeads;i++) p.roles.push({ type:"lead", actorId:null, index:i+1 });
  for (let i=0;i<minSupporting;i++) p.roles.push({ type:"supporting", actorId:null, index:i+1 });
  for (let i=0;i<minMinor;i++) p.roles.push({ type:"minor", actorId:null, index:i+1 });
  p.status = "casting";
  STATE.currentView = "project-detail";
  render();
}

function renderCasting(p) {
  const assignedIds = p.roles.map(r => r.actorId).filter(Boolean);
  const director = getDirectorById(p.directorId);
  const mins = getRoleMinimums(p.genre, p.castSize);
  const [minLeads, minSupporting, minMinor] = mins;

  const filledLeads = p.roles.filter(r=>r.type==="lead"&&r.actorId).length;
  const filledSupporting = p.roles.filter(r=>r.type==="supporting"&&r.actorId).length;
  const filledMinor = p.roles.filter(r=>r.type==="minor"&&r.actorId).length;
  const allFilled = filledLeads>=minLeads && filledSupporting>=minSupporting && (minMinor===0||filledMinor>=minMinor);

  return `
    <div style="margin-bottom:12px">
      <button class="btn btn-secondary btn-sm" onclick="navigate('projects')">← Projects</button>
    </div>
    <div class="page-title">${p.title} — Week 2: Casting</div>

    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-title">Project Info</div>
          <div class="skill-row"><span class="skill-name">Genre</span><span>${p.genre}</span></div>
          <div class="skill-row"><span class="skill-name">Cast Size</span><span>${CAST_SIZE_LABELS[p.castSize]}</span></div>
          <div class="skill-row"><span class="skill-name">Scope</span><span>${SCOPE_LABELS[p.scope]}</span></div>
          <div class="skill-row"><span class="skill-name">Director</span><span style="color:#e94560">${director ? director.name : "—"}</span></div>
          ${director ? `<div style="margin-top:4px">${director.tones.map(t=>badge(t,"badge-purple")).join(" ")}</div>` : ""}
        </div>

        <div class="panel">
          <div class="panel-title">Role Slots</div>
          ${p.roles.map((role, idx) => {
            const actor = role.actorId ? getActorById(role.actorId) : null;
            return `
              <div class="role-slot ${actor?"filled":"empty"}" style="margin-bottom:6px">
                <div>
                  <div class="role-type">${role.type} #${role.index}</div>
                  <div class="role-actor">${actor ? actor.name : `<span class="text-muted">— Empty —</span>`}</div>
                  ${actor ? `<div style="margin-top:3px">${genrePreferenceLabel(actor, p.genre)}</div>` : ""}
                </div>
                <div style="display:flex;gap:6px;align-items:center">
                  ${actor
                    ? `<button class="btn btn-secondary btn-sm" onclick="uncastRole(${idx})">Remove</button>`
                    : ""
                  }
                </div>
              </div>
            `;
          }).join("")}

          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-secondary btn-sm" onclick="addOptionalRole('lead')" ${p.roles.filter(r=>r.type==="lead").length>=3?"disabled style='opacity:0.4'":""}>+ Add Lead</button>
            <button class="btn btn-secondary btn-sm" onclick="addOptionalRole('supporting')" ${p.roles.filter(r=>r.type==="supporting").length>=6?"disabled style='opacity:0.4'":""}>+ Add Supporting</button>
            <button class="btn btn-secondary btn-sm" onclick="addOptionalRole('minor')" ${p.roles.filter(r=>r.type==="minor").length>=4?"disabled style='opacity:0.4'":""}>+ Add Minor</button>
            <button class="btn btn-secondary btn-sm" onclick="addOptionalRole('cameo')">+ Add Cameo</button>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:4px">
          <button class="btn btn-success" onclick="greenlightProject()" ${allFilled?"":"disabled style='opacity:0.4'"}>
            🎬 Greenlight Production
          </button>
        </div>
        ${!allFilled ? `<div class="text-muted" style="margin-top:6px">⚠ Fill all required roles to greenlight</div>` : ""}
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">Available Actors</div>
          <table>
            <thead>
              <tr><th>Name</th><th>Charisma</th><th>Range</th><th>Star Power</th><th>Fit</th><th></th></tr>
            </thead>
            <tbody>
              ${STATE.actors.map(a => {
                const alreadyCast = assignedIds.includes(a.id);
                const emptySlots = p.roles.filter(r=>!r.actorId);
                return `
                  <tr style="${alreadyCast?"opacity:0.4":""}">
                    <td><strong>${a.name}</strong><br><span class="text-muted">${a.age}yo · Rep ${a.reputation}</span></td>
                    <td>${stars(a.skills.charisma)}</td>
                    <td>${stars(a.skills.range)}</td>
                    <td>${stars(a.skills.starPower)}</td>
                    <td>${genrePreferenceLabel(a, p.genre)}</td>
                    <td>
                      ${!alreadyCast && emptySlots.length > 0
                        ? `<select onchange="castActorToRole('${a.id}', parseInt(this.value))" style="width:auto;padding:4px;font-size:11px">
                            <option value="-1">Cast as...</option>
                            ${emptySlots.map((slot, i) => {
                              const realIdx = p.roles.indexOf(slot);
                              return `<option value="${realIdx}">${slot.type} #${slot.index}</option>`;
                            }).join("")}
                          </select>`
                        : alreadyCast
                          ? `<span class="text-muted">Cast</span>`
                          : `<span class="text-muted">No slots</span>`
                      }
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function castActorToRole(actorId, roleIdx) {
  const p = STATE.newProject || STATE.projects.find(pr => pr.status === "casting");
  if (!p || roleIdx < 0 || roleIdx >= p.roles.length) return;
  p.roles[roleIdx].actorId = actorId;
  render();
}

function uncastRole(roleIdx) {
  const p = STATE.newProject || STATE.projects.find(pr => pr.status === "casting");
  if (!p) return;
  p.roles[roleIdx].actorId = null;
  render();
}

function addOptionalRole(type) {
  const p = STATE.newProject;
  if (!p) return;
  const existing = p.roles.filter(r => r.type === type);
  const maxes = { lead:3, supporting:6, minor:4, cameo:99 };
  if ((existing.length) >= (maxes[type]||99)) return;
  p.roles.push({ type, actorId:null, index: existing.length + 1 });
  render();
}

// ============================================================
// PRODUCTION SIMULATION (simplified)
// ============================================================

function greenlightProject() {
  const p = STATE.newProject;
  if (!p) return;
  const mins = getRoleMinimums(p.genre, p.castSize);
  const filledLeads = p.roles.filter(r=>r.type==="lead"&&r.actorId).length;
  const filledSupporting = p.roles.filter(r=>r.type==="supporting"&&r.actorId).length;
  const filledMinor = p.roles.filter(r=>r.type==="minor"&&r.actorId).length;
  if (filledLeads < mins[0] || filledSupporting < mins[1] || (mins[2]>0 && filledMinor<mins[2])) return;

  const weeksRange = SCOPE_WEEKS[SCOPE_LABELS[p.scope]];
  p.shootWeeks = weeksRange[0] + Math.floor(Math.random() * (weeksRange[1] - weeksRange[0] + 1));
  p.weeksElapsed = 0;
  p.status = "production";
  p.turmoil = 0;
  STATE.projects.push(p);
  STATE.newProject = null;
  STATE.currentView = "project-detail";
  STATE.selectedProjectId = p.id;
  render();
  saveGame();
}

function selectProject(id) {
  STATE.selectedProjectId = id;
  STATE.currentView = "project-detail";
  render();
}

function renderProjects() {
  if (STATE.projects.length === 0) {
    return `
      <div class="page-title">Active Projects</div>
      <div class="panel">
        <div class="empty-state">No projects yet. <a href="#" onclick="navigate('create-project');return false;" style="color:#e94560">Create one →</a></div>
      </div>
    `;
  }
  return `
    <div class="page-title">Active Projects</div>
    <div class="panel">
      ${STATE.projects.map(p => `
        <div class="role-slot ${p.status==="complete"?"":"filled"}" onclick="selectProject('${p.id}')" style="cursor:pointer;margin-bottom:8px">
          <div>
            <div style="font-weight:bold;color:#e0e0e0">${p.title}</div>
            <div class="text-muted">${p.genre} · ${SCOPE_LABELS[p.scope]} scope · ${CAST_SIZE_LABELS[p.castSize]} cast</div>
            ${p.status==="production" ? `<div class="text-muted">Week ${p.weeksElapsed}/${p.shootWeeks} · Turmoil: ${p.turmoil}</div>` : ""}
          </div>
          <div>${badge(p.status.toUpperCase(), p.status==="complete"?"badge-green":p.status==="production"?"badge-blue":"badge-yellow")}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderProjectDetail() {
  const p = STATE.projects.find(pr => pr.id === STATE.selectedProjectId) || STATE.newProject;
  if (!p) return `<div class="empty-state">Project not found.</div>`;
  if (p.status === "casting") return renderCasting(p);
  if (p.status === "production" || p.status === "complete") return renderProduction(p);
  return `<div class="empty-state">Unknown project state.</div>`;
}

function renderProduction(p) {
  const director = getDirectorById(p.directorId);
  const isComplete = p.status === "complete";
  const progressPct = Math.min(100, Math.round((p.weeksElapsed / p.shootWeeks) * 100));

  return `
    <div style="margin-bottom:12px">
      <button class="btn btn-secondary btn-sm" onclick="navigate('projects')">← Projects</button>
    </div>
    <div class="page-title">${p.title} ${isComplete ? badge("COMPLETE","badge-green") : badge("IN PRODUCTION","badge-blue")}</div>

    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-title">Production Status</div>
          <div class="skill-row"><span class="skill-name">Genre</span><span>${p.genre}</span></div>
          <div class="skill-row"><span class="skill-name">Scope</span><span>${SCOPE_LABELS[p.scope]}</span></div>
          <div class="skill-row"><span class="skill-name">Director</span><span style="color:#e94560">${director ? director.name : "—"}</span></div>
          <div class="skill-row"><span class="skill-name">Shoot Progress</span><span>${p.weeksElapsed}/${p.shootWeeks} weeks</span></div>
          <div class="skill-row"><span class="skill-name">Turmoil</span><span style="color:${p.turmoil>20?"#e94560":p.turmoil>10?"#c0a020":"#40c060"}">${p.turmoil}</span></div>

          <div style="margin-top:10px">
            <div class="text-muted" style="margin-bottom:4px">Shoot progress</div>
            <div style="background:#0f1a30;border-radius:3px;height:10px;border:1px solid #0f3460">
              <div style="height:100%;width:${progressPct}%;background:#e94560;border-radius:3px;transition:width 0.3s"></div>
            </div>
            <div class="text-muted" style="margin-top:3px">${progressPct}% complete</div>
          </div>

          ${isComplete && p.scores ? `
            <hr class="divider">
            <div class="panel-title">Final Scores</div>
            <div class="detail-grid-3" style="margin-top:8px">
              <div class="stat-box">
                <div class="val" style="color:${p.scores.criticScore>=70?"#40c060":p.scores.criticScore>=50?"#c0a020":"#e94560"}">${p.scores.criticScore}</div>
                <div class="lbl">Critic Score</div>
              </div>
              <div class="stat-box">
                <div class="val" style="color:${p.scores.publicScore>=70?"#40c060":p.scores.publicScore>=50?"#c0a020":"#e94560"}">${p.scores.publicScore}</div>
                <div class="lbl">Public Score</div>
              </div>
              <div class="stat-box">
                <div class="val">${p.scores.turmoilPenalty}</div>
                <div class="lbl">Turmoil Penalty</div>
              </div>
            </div>
          ` : ""}

          ${!isComplete ? `
            <div style="margin-top:14px">
              <button class="btn btn-primary" onclick="simulateWeek('${p.id}')">Simulate 1 Week ▶</button>
            </div>
          ` : ""}
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">Cast</div>
          ${p.roles.map(role => {
            const actor = role.actorId ? getActorById(role.actorId) : null;
            return `
              <div class="role-slot ${actor?"filled":"empty"}" style="margin-bottom:6px">
                <div>
                  <div class="role-type">${role.type} #${role.index}</div>
                  <div class="role-actor">${actor ? actor.name : "— Empty —"}</div>
                  ${actor ? `<div style="margin-top:3px">${stars(actor.skills.charisma)} CHA &nbsp; ${stars(actor.skills.range)} RNG</div>` : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>

        ${p.log && p.log.length > 0 ? `
          <div class="panel">
            <div class="panel-title">Production Log</div>
            ${p.log.slice().reverse().map(entry => `
              <div style="padding:5px 0;border-bottom:1px solid #0f1a30;font-size:12px;color:${entry.type==="event"?"#c0a020":entry.type==="bad"?"#e94560":"#a0c0a0"}">${entry.text}</div>
            `).join("")}
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

// ============================================================
// SIMULATION LOGIC
// ============================================================

function simulateWeek(projectId) {
  const p = STATE.projects.find(pr => pr.id === projectId);
  if (!p || p.status !== "production") return;

  p.weeksElapsed++;
  if (!p.log) p.log = [];

  // Random event chance
  if (Math.random() < 0.25) {
    const event = pickRandomEvent(p);
    p.log.push(event);
    p.turmoil += event.turmoilDelta || 0;
  }

  // Check if shoot is complete
  if (p.weeksElapsed >= p.shootWeeks) {
    p.status = "complete";
    p.scores = calculateScores(p);
    p.log.push({ text:`🎬 Production wrapped! Critic: ${p.scores.criticScore} · Public: ${p.scores.publicScore}`, type:"good" });
    updateCareerFilms(p);
  }

  p.log.push({ text:`Week ${p.weeksElapsed} of ${p.shootWeeks} completed.`, type:"log" });
  STATE.week++;
  saveGame();
  render();
}

function pickRandomEvent(p) {
  const events = [
    { text:"📅 Smooth shoot day. Everything on schedule.", type:"log", turmoilDelta:0 },
    { text:"⚡ Minor on-set disagreement between cast members.", type:"event", turmoilDelta:3 },
    { text:"🎭 Actor delivers a standout performance in a key scene.", type:"good", turmoilDelta:0 },
    { text:"🌧 Weather delay. Production pushed back a day.", type:"event", turmoilDelta:2 },
    { text:"✨ The crew is firing on all cylinders today.", type:"good", turmoilDelta:-1 },
    { text:"😤 Tension on set between cast and crew.", type:"bad", turmoilDelta:4 },
    { text:"📸 Behind the scenes footage leaks online. Buzz increases.", type:"event", turmoilDelta:0 },
    { text:"🤝 Director and lead have a creative breakthrough.", type:"good", turmoilDelta:-2 },
  ];

  // Trait-influenced events
  const director = getDirectorById(p.directorId);
  if (director && director.traits.includes("Perfectionist") && Math.random() < 0.4) {
    return { text:"🔁 Director calls for reshoots on yesterday's scenes. Schedule slips.", type:"event", turmoilDelta:3 };
  }
  const castActors = p.roles.map(r => r.actorId ? getActorById(r.actorId) : null).filter(Boolean);
  const divas = castActors.filter(a => a.traits.includes("Diva"));
  if (divas.length > 0 && Math.random() < 0.3) {
    const diva = divas[Math.floor(Math.random()*divas.length)];
    return { text:`😤 ${diva.name} is making demands on set again.`, type:"bad", turmoilDelta:5 };
  }
  const substanceActors = castActors.filter(a => a.traits.includes("Substance Abuse"));
  if (substanceActors.length > 0 && Math.random() < 0.2) {
    const sa = substanceActors[Math.floor(Math.random()*substanceActors.length)];
    return { text:`⚠ ${sa.name} didn't show up for this morning's shoot.`, type:"bad", turmoilDelta:6 };
  }
  const mentors = castActors.filter(a => a.traits.includes("Mentor"));
  if (mentors.length > 0 && Math.random() < 0.3) {
    const mentor = mentors[Math.floor(Math.random()*mentors.length)];
    return { text:`🌟 ${mentor.name} is elevating the whole cast's performance.`, type:"good", turmoilDelta:-2 };
  }

  return events[Math.floor(Math.random() * events.length)];
}

function calculateScores(p) {
  const director = getDirectorById(p.directorId);
  const castActors = p.roles.map(r => r.actorId ? getActorById(r.actorId) : null).filter(Boolean);

  // CRITIC SCORE: average of performance skills
  let perfTotal = 0;
  let perfCount = 0;
  castActors.forEach(a => {
    const weight = p.roles.find(r=>r.actorId===a.id)?.type === "lead" ? 1.0 : 0.6;
    const perf = (a.skills.range * 2 + a.skills.presence + a.skills.characterWork + a.skills.charisma) / 5;
    perfTotal += perf * weight;
    perfCount += weight;
  });
  const avgActorPerf = perfCount > 0 ? perfTotal / perfCount : 2.5;

  let directorScore = 0;
  if (director) {
    directorScore = (director.skills.vision + director.skills.storytelling + director.skills.direction + director.skills.visualStyle) / 4;
  }

  const rawCritic = ((avgActorPerf / 5) * 50) + ((directorScore / 5) * 35) + (Math.random() * 15);
  const turmoilPenalty = Math.floor(p.turmoil / 3);
  const criticScore = Math.max(1, Math.min(100, Math.round(rawCritic - turmoilPenalty)));

  // PUBLIC SCORE: cumulative star power + commercial instinct
  let starTotal = 0;
  castActors.forEach(a => { starTotal += a.skills.starPower + (a.reputation / 50); });
  const dirCommercial = director ? director.skills.commercialInstinct : 2.5;
  const rawPublic = ((starTotal / (castActors.length || 1)) / 6) * 40 + ((dirCommercial / 5) * 25) + (STATE.commercialDraw / 100) * 20 + (Math.random() * 15);
  const publicScore = Math.max(1, Math.min(100, Math.round(rawPublic - turmoilPenalty * 0.5)));

  return { criticScore, publicScore, turmoilPenalty };
}

function updateCareerFilms(p) {
  const castActors = p.roles.map(r => r.actorId ? getActorById(r.actorId) : null).filter(Boolean);
  castActors.forEach(a => {
    a.careerFilms.push({ title: p.title, year: p.year, role: p.roles.find(r=>r.actorId===a.id)?.type, quality: p.scores.criticScore });
    a.reputation = Math.min(100, a.reputation + Math.round((p.scores.criticScore - 50) / 10));
    a.relevance = Math.min(100, a.relevance + 5);
  });
  const director = getDirectorById(p.directorId);
  if (director) {
    director.careerFilms.push({ title: p.title, year: p.year, quality: p.scores.criticScore });
    director.reputation = Math.min(100, director.reputation + Math.round((p.scores.criticScore - 50) / 8));
  }
  STATE.completedFilms.push({ id: p.id, title: p.title, year: p.year, genre: p.genre, criticScore: p.scores.criticScore, publicScore: p.scores.publicScore });
  STATE.criticalPrestige = Math.min(100, STATE.criticalPrestige + Math.round((p.scores.criticScore - 50) / 8));
  STATE.commercialDraw = Math.min(100, STATE.commercialDraw + Math.round((p.scores.publicScore - 50) / 8));
}

// ============================================================
// BOOT
// ============================================================

loadGame();
render();

</script>
